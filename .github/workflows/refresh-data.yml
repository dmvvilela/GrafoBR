name: refresh-data

# Weekly rebuild of the ego-network JSON from public sources.
#
# Phase 2 runs a small Câmara+TSE slice. Phase 3 expands this toward the full
# ~594-politician build and adds the heavier Receita/Transparência sources.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Least privilege. Bump to `contents: write` ONLY if you choose to commit output
# back into the repo (publish option B below).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline deps
        working-directory: pipeline
        run: pip install -r requirements.txt

      # ⚠️ DISK: GitHub runners have only ~14 GB free. DO NOT download the full Receita
      # dump here. Use the stream/filter approach, or the Base dos Dados BigQuery path
      # (see docs/DATA-FEASIBILITY.md → "Storage & volume strategy").
      # If using BigQuery, authenticate first, e.g.:
      #   - uses: google-github-actions/auth@v2
      #     with: { credentials_json: '${{ secrets.GCP_SA_KEY }}' }

      - name: Build ego-networks
        working-directory: pipeline
        run: PYTHONPATH=src python -m grafobr_pipeline.run --limit 5 --output-dir ../data --cache-dir .cache

      # ---- Publish (pick ONE; A is the simplest while iterating) ----

      # A) Upload as a build artifact. Works even though data/*.json is gitignored.
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: ego-networks
          path: data/*.json
          if-no-files-found: ignore

      # B) Commit regenerated JSON back to the repo (needs `permissions: contents: write`
      #    above, and `git add -f` because data/*.json is gitignored):
      #   - name: Commit data
      #     run: |
      #       git config user.name "github-actions[bot]"
      #       git config user.email "github-actions[bot]@users.noreply.github.com"
      #       git add -f data/*.json
      #       git diff --cached --quiet || git commit -m "chore: refresh ego-network data"
      #       git push

      # C) Push to Cloudflare R2 / your CDN, or trigger the web deploy. Wire when the
      #    serve target is finalized (see docs/PLAN.md §8 Deployment).
