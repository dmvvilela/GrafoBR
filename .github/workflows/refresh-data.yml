name: refresh-data

# Regenerate the committed data snapshot (donations + sócio + federal contracts) and
# commit it back. This mirrors `pipeline/scripts/build_all.sh` exactly — it does NOT do a
# small donation-only build.
#
# Refreshing is normally done LOCALLY (`bash pipeline/scripts/build_all.sh 512` -> commit),
# because it needs the ~1.6GB Receita CNPJ download and BigQuery auth. This workflow is the
# CI equivalent and is **manual-trigger only** (no weekly cron that could fail or drift).
#
# Prerequisite: repo secret GCP_SA_KEY = a Google Cloud service-account JSON key with
# BigQuery access (for the contracts step). Without it the run fails loudly — never silent.

on:
  workflow_dispatch: {}
  # schedule:                       # opt-in: enable only after GCP_SA_KEY is configured
  #   - cron: "17 6 1 * *"          # monthly

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pipeline deps
        working-directory: pipeline
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Authenticate to BigQuery (contracts)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Download Receita CNPJ shards (~1.6GB, one-time per run)
        working-directory: pipeline
        run: PYTHONPATH=src .venv/bin/python scripts/download_cnpj_files.py

      - name: Build full dataset (donations + sócio + contracts)
        working-directory: pipeline
        run: bash scripts/build_all.sh 512

      - name: Sync + derive into the committed snapshot
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          node scripts/sync-data.mjs
          node scripts/derive-shared.mjs
          node scripts/derive-highlights.mjs
          node scripts/derive-ceap-trails.mjs

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          git diff --cached --quiet || git commit -m "chore: refresh data snapshot [skip ci]"
          git push
